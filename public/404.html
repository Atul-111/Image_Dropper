<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Not Found - Image Dropper</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">📸 Image Dropper</h1>
            </div>
        </header>

        <main class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: 400px;">
            <div style="text-align: center;">
                <div style="font-size: 5rem; margin-bottom: 20px;">😕</div>
                <h2 style="font-size: 2rem; margin-bottom: 10px;">Image Not Found</h2>
                <p style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 30px;">
                    The image you're looking for doesn't exist or has been removed.
                </p>
                <a href="/" class="btn btn-primary" style="display: inline-block; text-decoration: none;">
                    🏠 Go to Home
                </a>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Image Dropper. Share images instantly.</p>
        </footer>
    </div>
</body>
</html>
